<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>给你的小礼物</title>
    <style>
        /* 👇 背景改成渐变色（流行风格） */
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 20px;
        }
        /* 👇 卡片更柔和、有毛玻璃感觉 */
        .card {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 28px;
            padding: 50px 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        /* 👇 文字颜色改成温柔粉色 + 加大字号 */
        .message {
            font-size: 1.45rem;
            line-height: 1.7;
            color: #e05678; /* 温柔粉色字体 */
            margin-bottom: 35px;
            white-space: pre-wrap;
            font-weight: 500;
        }
        /* 👇 音乐播放器美化 */
        audio {
            width: 100%;
            margin-top: 20px;
            border-radius: 50px;
        }
        /* 👇 底部提示文字更可爱 */
        .footer {
            margin-top: 30px;
            color: #ff8fab;
            font-size: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="message">
           虽然 zwb 早几天才学玩极限 已经够慢了<br>
 	       但相较于你学 java 的<br> 
           路程还算多一点点哦[呲牙]<br>
            so...
        </div>

        <!-- 👇 这里记得换成你的真实音乐链接.mp3 -->
        <audio controls src="nianshaoyouwei.mp3"></audio>
        <div class="footer">点一下播放键 ▶️</div>
    </div>
</body>
</html>
